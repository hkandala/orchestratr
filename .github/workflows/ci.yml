name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    name: build · test · fmt · clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.89 --profile minimal --component rustfmt,clippy
          rustup default 1.89

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      # Unit + non-e2e integration tests only. The ORCR_E2E=1 suites need a live herdr
      # binary + session and run in the milestone's manual/e2e gate, not in CI.
      - name: Unit tests
        run: cargo test

      - name: Release build
        run: cargo build --release
